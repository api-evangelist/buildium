aid: buildium
name: Buildium
url: https://raw.githubusercontent.com/api-evangelist/buildium/refs/heads/main/apis.yml
description: >-
  Buildium, part of RealPage, is a cloud property-management platform aimed at
  small and mid-sized residential, association, and community-association
  property managers. The platform covers accounting, leasing, applicant and
  tenant management, rent collection, maintenance, communications, owner and
  resident portals, and association management. Buildium publishes a Public API
  used by certified partners and customers for property, lease, tenant, owner,
  vendor, rental application, financial, and webhook integration with the
  Buildium platform.
kind: company
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Property Management
  - Residential
  - Community Associations
  - Accounting
  - PropTech
  - SMB
created: '2026-05-23'
modified: '2026-05-23'
specificationVersion: '0.19'
apis:
  - aid: buildium:public-api
    name: Buildium Public API
    description: >-
      Buildium's REST Public API used by customers and certified partners to
      read and write property, lease, tenant, owner, vendor, rental
      application, financial, and association data inside the Buildium
      platform. Authentication is via per-customer API key credentials issued
      from the Buildium account.
    humanURL: https://www.buildium.com/developers
    baseURL: https://api.buildium.com
    tags:
      - REST
      - Partner API
      - Property Management
    properties:
      - type: Documentation
        url: https://www.buildium.com/developers
  - aid: buildium:properties
    name: Buildium Properties API
